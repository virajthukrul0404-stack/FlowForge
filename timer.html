<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Focus Timer | FocusForge</title>

<link rel="stylesheet" href="css/style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}
</script>

<style>

.focus-mode .sidebar{
display:none;
}

.focus-mode .main{
width:100%;
text-align:center;
}

.focus-mode .timer-display{
font-size:140px;
}

.focus-mode .timer-container{
margin:auto;
margin-top:120px;
}

</style>

</head>


<body>

<div class="dashboard" id="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2 class="logo">FocusForge</h2>

<ul class="menu">

<ul class="menu">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="timer.html">Focus Timer</a></li>
<li><a href="stats.html">Statistics</a></li>
<li><a href="learn.html">Learn</a></li>
<li><a href="settings.html">Settings</a></li>

</ul>

</ul>

</aside>



<!-- MAIN -->

<main class="main">

<h1>Focus Timer</h1>
<p>Select a productivity mode and begin deep work.</p>


<div class="timer-container">

<!-- TIMER MODES -->

<div class="timer-modes">

<button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>

<button class="mode-btn" data-mode="deep">45 / 15</button>

<button class="mode-btn" data-mode="ultradian">Ultradian</button>

</div>


<!-- PHASE -->

<div class="phase-indicator" id="phase">
Focus Session
</div>


<!-- TIMER DISPLAY -->

<div class="timer-display" id="timerDisplay">
25:00
</div>


<!-- BUTTONS -->

<div class="timer-buttons">

<button class="btn" id="startBtn">Start</button>

<button class="btn" id="pauseBtn">Pause</button>

<button class="btn" id="resetBtn">Reset</button>

</div>

</div>

</main>

</div>



<script>

/* TIMER MODES */

const modes = {

pomodoro:{focus:25,break:5},

deep:{focus:45,break:15},

ultradian:{focus:90,break:20}

};


/* VARIABLES */

let currentMode="pomodoro";

let phase="focus";

let timerInterval=null;

let timeRemaining=modes[currentMode].focus*60;

let paused=false;


/* ELEMENTS */

const dashboard=document.getElementById("dashboard");

const timerDisplay=document.getElementById("timerDisplay");

const phaseIndicator=document.getElementById("phase");

const startBtn=document.getElementById("startBtn");

const pauseBtn=document.getElementById("pauseBtn");

const resetBtn=document.getElementById("resetBtn");

const modeButtons=document.querySelectorAll(".mode-btn");


/* DISPLAY */

function updateDisplay(){

let minutes=Math.floor(timeRemaining/60);

let seconds=timeRemaining%60;

seconds=seconds<10?"0"+seconds:seconds;

timerDisplay.textContent=minutes+":"+seconds;

}


/* START */

function startTimer(){

if(timerInterval) return;

startBtn.disabled=true;

dashboard.classList.add("focus-mode");

timerInterval=setInterval(()=>{

timeRemaining--;

updateDisplay();

if(timeRemaining<=0){

switchPhase();

}

},1000);

}


/* PAUSE / RESUME */

function pauseTimer(){

if(!paused){

clearInterval(timerInterval);

timerInterval=null;

pauseBtn.textContent="Resume";

paused=true;

}else{

pauseBtn.textContent="Pause";

paused=false;

startTimer();

}

}


/* RESET */

function resetTimer(){

clearInterval(timerInterval);

timerInterval=null;

paused=false;

pauseBtn.textContent="Pause";

startBtn.disabled=false;

dashboard.classList.remove("focus-mode");

phase="focus";

phaseIndicator.textContent="Focus Session";

timeRemaining=modes[currentMode].focus*60;

updateDisplay();

}


/* SAVE SESSION FOR STATS */

function saveSession(){

let sessions=localStorage.getItem("sessions")||0;

sessions++;

localStorage.setItem("sessions",sessions);


let focusToday=localStorage.getItem("focusToday")||0;

focusToday=parseInt(focusToday)+modes[currentMode].focus;

localStorage.setItem("focusToday",focusToday);


let week=JSON.parse(localStorage.getItem("weekStats"))||[0,0,0,0,0,0,0];

let day=new Date().getDay();

week[day]+=modes[currentMode].focus;

localStorage.setItem("weekStats",JSON.stringify(week));

}


/* SWITCH PHASE */

function switchPhase(){

clearInterval(timerInterval);

timerInterval=null;

if(phase==="focus"){

saveSession();

phase="break";

phaseIndicator.textContent="Break Time";

timeRemaining=modes[currentMode].break*60;

}else{

phase="focus";

phaseIndicator.textContent="Focus Session";

timeRemaining=modes[currentMode].focus*60;

}

updateDisplay();

startTimer();

}


/* MODE SWITCH */

modeButtons.forEach(button=>{

button.addEventListener("click",()=>{

modeButtons.forEach(b=>b.classList.remove("active"));

button.classList.add("active");

currentMode=button.dataset.mode;

resetTimer();

});

});


/* BUTTON EVENTS */

startBtn.addEventListener("click",startTimer);

pauseBtn.addEventListener("click",pauseTimer);

resetBtn.addEventListener("click",resetTimer);


/* INITIAL DISPLAY */

updateDisplay();

</script>

</body>
</html>
