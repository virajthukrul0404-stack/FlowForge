<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FocusForge Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}
</script>

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2 class="logo">FocusForge</h2>

<ul class="menu">

<li><a href="dashboard.html" class="active">Dashboard</a></li>
<li><a href="timer.html">Focus Timer</a></li>
<li><a href="stats.html">Statistics</a></li>
<li><a href="learn.html">Learn</a></li>
<li><a href="settings.html">Settings</a></li>

</ul>

</aside>



<!-- MAIN CONTENT -->

<main class="main">

<h1>Welcome Back</h1>
<p>Ready to forge your focus today?</p>



<!-- STATS CARDS -->

<div class="cards">

<div class="card">
<h3>Focus Time Today</h3>
<p class="stat">2h 15m</p>
</div>

<div class="card">
<h3>Focus Streak</h3>
<p class="stat">6 Days</p>
</div>

<div class="card">
<h3>Sessions Completed</h3>
<p class="stat">4</p>
</div>

</div>



<!-- DASHBOARD GRID -->

<div class="dashboard-grid">


<!-- FOCUS SESSION -->

<div class="focus-box">

<h2>Start a Focus Session</h2>

<p>Eliminate distractions and enter deep work mode.</p>

<a href="timer.html" class="btn">Start Timer</a>

</div>



<!-- TODO LIST -->

<div class="card todo-card">

<h2>Today's Tasks</h2>

<div class="todo-input">

<input
type="text"
id="taskInput"
placeholder="Add a task..."
>

<button class="btn" id="addTaskBtn">Add</button>

</div>

<ul id="taskList"></ul>

</div>


</div>


</main>

</div>



<script>

/* ELEMENTS */

const input = document.getElementById("taskInput");
const addBtn = document.getElementById("addTaskBtn");
const taskList = document.getElementById("taskList");

let tasks = [];


/* LOAD TASKS FROM DATABASE */

function loadTasks(){

fetch("http://localhost:3000/tasks")

.then(res => res.json())

.then(data => {

tasks = data;

renderTasks();

});

}


/* RENDER TASKS */

function renderTasks(){

taskList.innerHTML = "";

tasks.forEach((task,index)=>{

const li = document.createElement("li");

li.className = "task";

li.innerHTML = `

<div class="task-left">

<div class="task-circle"></div>

<span>${task.text}</span>

</div>

<button class="delete-btn">✕</button>

`;

/* COMPLETE TASK */

li.querySelector(".task-left").addEventListener("click",()=>{

li.classList.toggle("completed");

});

/* DELETE TASK */

li.querySelector(".delete-btn").addEventListener("click",(e)=>{

e.stopPropagation();

fetch(`http://localhost:3000/tasks/${task.id}`,{

method:"DELETE"

}).then(()=>{

loadTasks();

});

});

taskList.appendChild(li);

});

}


/* ADD TASK */

addBtn.addEventListener("click",()=>{

const text = input.value.trim();

if(text === "") return;

fetch("http://localhost:3000/tasks",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({text:text})

})
.then(res => res.json())
.then(()=>{

loadTasks();

});

input.value="";

});


/* INITIAL LOAD */

loadTasks();

</script>

</body>
</html>
