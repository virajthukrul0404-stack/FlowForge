<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statistics | FocusForge</title>

<link rel="stylesheet" href="css/style.css">

<style>

.chart{
margin-top:40px;
}

.bar-row{
display:flex;
align-items:center;
margin:10px 0;
}

.day{
width:60px;
}

.bar{
height:20px;
background:#3b82f6;
border-radius:6px;
margin-left:10px;
}

</style>

<script>

if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}

</script>

</head>


<body>

<div class="dashboard">

<aside class="sidebar">

<h2 class="logo">FocusForge</h2>

<ul class="menu">
<ul class="menu">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="timer.html">Focus Timer</a></li>
<li><a href="stats.html">Statistics</a></li>
<li><a href="learn.html">Learn</a></li>
<li><a href="settings.html">Settings</a></li>

</ul>
</ul>

</aside>


<main class="main">

<h1>Statistics</h1>

<div class="cards">

<div class="card">
<h3>Focus Time Today</h3>
<p class="stat" id="todayTime">0 min</p>
</div>

<div class="card">
<h3>Sessions Completed</h3>
<p class="stat" id="sessionsCompleted">0</p>
</div>

</div>


<h2 style="margin-top:40px;">Weekly Focus</h2>

<div class="chart" id="chart"></div>

</main>

</div>


<script>

const todayTime=localStorage.getItem("focusToday")||0;
const sessions=localStorage.getItem("sessions")||0;

document.getElementById("todayTime").textContent=todayTime+" min";
document.getElementById("sessionsCompleted").textContent=sessions;


const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const week=JSON.parse(localStorage.getItem("weekStats"))||[0,0,0,0,0,0,0];

const chart=document.getElementById("chart");

week.forEach((minutes,i)=>{

let row=document.createElement("div");
row.className="bar-row";

let label=document.createElement("div");
label.className="day";
label.textContent=days[i];

let bar=document.createElement("div");
bar.className="bar";

bar.style.width=(minutes*2)+"px";

row.appendChild(label);
row.appendChild(bar);

chart.appendChild(row);

});

</script>

</body>
</html>
