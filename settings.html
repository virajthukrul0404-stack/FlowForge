<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | FocusForge</title>

<link rel="stylesheet" href="css/style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}
</script>

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">FocusForge</h2>

<ul class="menu">

<ul class="menu">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="timer.html">Focus Timer</a></li>

</ul>

</ul>

</aside>


<!-- Main -->

<main class="main">

<h1>Settings</h1>
<p>Customize your FocusForge experience</p>


<div class="card" style="margin-top:30px;width:320px;">

<h3>Theme</h3>

<button class="btn" id="themeToggle">
Toggle Theme
</button>

</div>

</main>

</div>


<script>

const toggle=document.getElementById("themeToggle");

/* Set initial button text */

if(localStorage.getItem("theme")==="dark"){
toggle.textContent="Switch to Light Mode";
}else{
toggle.textContent="Switch to Dark Mode";
}

/* Toggle theme */

toggle.addEventListener("click",()=>{

document.documentElement.classList.toggle("dark");

if(document.documentElement.classList.contains("dark")){

localStorage.setItem("theme","dark");
toggle.textContent="Switch to Light Mode";

}else{

localStorage.setItem("theme","light");
toggle.textContent="Switch to Dark Mode";

}

});

</script>


</body>
</html>
